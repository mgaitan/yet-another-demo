name: Copier Template Update

on:
  schedule:
    - cron: "0 0 */20 * *"
  repository_dispatch:
    types: [template-release]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7

      - name: Capture template version (before)
        id: template-version-before
        run: |
          before=$(yq -r '._commit // "unknown"' .copier-answers.yml)
          echo "before=$before" >> "$GITHUB_OUTPUT"

      - name: Refresh from template
        run: uvx git+https://github.com/mgaitan/python-package-copier-template -- .

      - name: Capture template version (after)
        id: template-version-after
        run: |
          after=$(yq -r '._commit // "unknown"' .copier-answers.yml)
          echo "after=$after" >> "$GITHUB_OUTPUT"

      - name: Commit and push template refresh
        env:
          BEFORE: ${{ steps.template-version-before.outputs.before }}
          AFTER: ${{ steps.template-version-after.outputs.after }}
        run: |
          if [ "$BEFORE" = "$AFTER" ] && git diff --quiet; then
            echo "No template changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: update project template to $AFTER"
          git push origin HEAD:main
